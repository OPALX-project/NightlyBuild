#!/bin/bash
#
# configuration for running at PSI 
#
branch='master'

declare __mydir="$(cd -P "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
source "${__mydir}/default-${branch}.conf"

#..............................................................................
# setup build environment
#
source /opt/psi/config/profile.bash
module purge
module use unstable
module load cmake/3.15.5
module load gnuplot/5.2.7
module load Python/3.6.3

module load gcc/8.4.0
module load gsl/2.6
module load OpenBLAS/0.3.10
module load gtest/1.10.0

module load openmpi/3.1.6
module load amrex/18.07_3d
module load boost/1.70.0
module load hdf5/1.10.6
module load parmetis/4.0.3

module load H5hut/2.0.0rc6
module load trilinos/12.18.1

module load emacs/26.3

unittests_args+=( '--gtest_filter=-TestApply:Field.PeriodicBC' )

